.dv{border-left:1px solid var(--brd);padding-left:14px}

.tr{display:grid;grid-template-columns:1fr 60px 60px 60px 44px;gap:1px;padding:3px 4px;border-radius:4px;font-size:10px;align-items:center}
.tr.bo{background:var(--hi);font-weight:700;border-top:2px solid var(--brd);margin-top:2px}
.mn{font-family:var(--m);text-align:right;font-size:9.5px}
.bd{text-align:right;font-family:var(--m);font-size:8px;font-weight:700;border-radius:3px;padding:1px 3px;white-space:nowrap}
.bd.up{color:var(--r);background:#fdf0ee}.bd.dn{color:var(--g);background:#f0f7f1}
.eg{display:grid;grid-template-columns:1fr auto;gap:1px 6px;font-size:10px;line-height:1.7}
.sc{display:flex;gap:8px;padding:8px;border-radius:8px;margin-bottom:5px;background:var(--hi);align-items:flex-start}
.sc .ic{font-size:24px;min-width:30px;text-align:center;line-height:1}
.sc .ti{font-weight:700;font-size:10.5px;margin-bottom:2px}
.sc .cols{display:flex;gap:5px;flex-wrap:wrap}
.sc .col{flex:1 1 100px;padding:4px 5px;border-radius:4px;font-size:9px}
.sc .col b{display:block;margin-bottom:1px}
.sc .ok{background:#edf5ef}.sc .no{background:#fdf0ee}
details.ev{margin-bottom:3px;border-left:3px solid #ddd;border-radius:0}
details.ev summary{padding:5px 8px;cursor:pointer;list-style:none;font-size:11px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
details.ev summary::after{content:"▸";font-size:10px;color:#bbb;transition:.2s}
details.ev[open] summary::after{transform:rotate(90deg)}
details.ev summary::-webkit-details-marker{display:none}
details.ev .td{padding:4px 8px 8px;font-size:9.5px;color:var(--mut)}
.sl{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;margin-bottom:1px}
.sv{font-family:var(--m);font-size:14px;font-weight:700}
.mt{background:#f5f0eb;border-radius:10px;padding:10px;font-size:9px;color:var(--mut);line-height:1.5;margin-bottom:10px}
.mt b{color:#3a3a3a}.mt p{margin:0 0 2px}
.ft{text-align:center;font-size:9px;color:#bbb;margin-bottom:20px}
.lnk{display:inline-block;margin-top:8px;padding:8px 16px;background:var(--r);color:#fff;border-radius:8px;text-decoration:none;font-weight:700;font-size:12px}
@media(max-width:370px){.th,.tr{grid-template-columns:1fr 50px 50px 50px 36px}.mn{font-size:8.5px}.bd{font-size:7px}.rc .v{font-size:15px}}
</style>
</head>

<div class="c"><div class="st">Nemovitosti — Praha</div>
<div class="bg" style="margin-bottom:6px">${["2+kk (55m²)","3+kk (75m²)","Dům (150m²)"].map((l,i)=>`<button class="b ${S.nem===i?"on":""}" onclick="S.nem=${i};render()">${l}</button>`).join("")}</div>
${(()=>{const typs=[{l:"2+kk",m:55,k:"bm"},{l:"3+kk",m:75,k:"bm"},{l:"Dům",m:150,k:"hm"}],t=typs[S.nem],pl=t.m,m2A=dA[t.k],m2B=dB[t.k],cAb=m2A*pl,cBb=m2B*pl,ltv=S.hlt/100,mes=S.hl*12,uA=cAb*ltv,uB=cBb*ltv,spA=Math.round(AN(uA,dA.hs,mes)),spB=Math.round(AN(uB,dB.hs,mes)),nk=S.nem>=2?"k3":S.nem===1?"k3":"k2",nA=gN(S.yA,nk),nB=gN(S.yB,nk);
return`<div class="sl"><span>LTV</span><span class="sv">${S.hlt}%</span></div><input type="range" min="50" max="100" step="5" value="${S.hlt}" oninput="S.hlt=+this.value;render()">
<div class="sl"><span>Splatnost</span><span class="sv">${S.hl} let</span></div><input type="range" min="10" max="35" value="${S.hl}" oninput="S.hl=+this.value;render()">
<div style="height:4px"></div>${H("")}${[R("Cena/m²",m2A,m2B),R("Cena "+t.l,cAb,cBb),R("Úrok",dA.hs,dB.hs,null,0,1,"%"),R("Hypotéka",uA,uB),R("Splátka/měs",spA,spB,null,1),R("Přeplatek",Math.round(spA*mes-uA),Math.round(spB*mes-uB)),R("Nájem/měs",nA,nB)].join("")}
<div style="margin-top:4px;padding:5px 8px;border-radius:6px;background:var(--hi);font-size:9px">Výplat na ${t.l}: <b style="color:var(--g)">${cA>0?Math.round(cAb/cA):"–"}m</b> (${S.yA}) vs <b style="color:var(--r)">${cB>0?Math.round(cBb/cB):"–"}m</b> (${S.yB}) · Splátka vs nájem (${S.yB}): ${spB>nB?`splátka +${F(spB-nB)}`:`nájem +${F(nB-spB)}`}</div>`})()}</div>

<div class="c"><div class="st">Auto</div>
${(()=>{const ap=[{l:"Ojetina 10+",s:7.5,se:18e3,po:6e3,pc:120e3},{l:"Ojetina 5–10",s:6.5,se:12e3,po:9e3,pc:300e3},{l:"Novější 0–5",s:5.8,se:8e3,po:14e3,pc:550e3},{l:"Nové",s:5.5,se:5e3,po:18e3,pc:800e3}],a=ap[S.at],c9=CPI(2019),iA_=c9[S.yA]||1,iB_=c9[S.yB]||1,pcA=Math.round(a.pc*iA_),pcB=Math.round(a.pc*iB_),finA=S.alt>0?Math.round(pcA*(S.alt/100)/S.ale/12):0,finB=S.alt>0?Math.round(pcB*(S.alt/100)/S.ale/12):0,fA=Math.round(S.km/100*a.s*dA.n),fB=Math.round(S.km/100*a.s*dB.n),seA=Math.round(a.se*iA_),seB=Math.round(a.se*iB_),poA=Math.round(a.po*iA_),poB=Math.round(a.po*iB_),stA=Math.round(2200*iA_),stB=Math.round(2200*iB_),paA=Math.round(6e3*iA_),paB=Math.round(6e3*iB_),tA=fA+seA+poA+stA+paA+finA*12,tB=fB+seB+poB+stB+paB+finB*12;
return`<div class="bg" style="margin-bottom:6px">${ap.map((p,i)=>`<button class="b ${S.at===i?"on":""}" onclick="S.at=${i};render()">${p.l}</button>`).join("")}</div>
<div class="sl"><span>Km/rok</span><span class="sv">${F(S.km)}</span></div><input type="range" min="3000" max="50000" step="1000" value="${S.km}" oninput="S.km=+this.value;render()" style="accent-color:#555">
<div class="sl"><span>Financování</span><span class="sv">${S.alt}%</span></div><input type="range" min="0" max="100" step="10" value="${S.alt}" oninput="S.alt=+this.value;render()" style="accent-color:#555">
${S.alt>0?`<div class="sl"><span>Splácení</span><span class="sv">${S.ale} let</span></div><input type="range" min="1" max="7" value="${S.ale}" oninput="S.ale=+this.value;render()" style="accent-color:#555">`:""}
<div class="nt">${a.s}l/100km · nafta · poříz. ~${F(pcB)} Kč (${S.yB})</div>
${H("")}${[R("Pořízení/rok",finA*12,finB*12),R("Pohonné hm.",fA,fB),R("Servis",seA,seB),R("Pojištění",poA,poB),R("STK+známka",stA,stB),R("Parkování",paA,paB),R("Celkem/rok",tA,tB,null,1),R("Celkem/měs",Math.round(tA/12),Math.round(tB/12),null,1)].join("")}`})()}</div>

<div class="c"><div class="st">Na co reálně dosáhneš?</div><div class="nt">Z volných peněz po odvodech a životních nákladech</div>
${(()=>{const ix=CPI(2019),xA=ix[S.yA]||1,xB=ix[S.yB]||1,zvA=Math.round(22e3*xA),zvB=Math.round(22e3*xB),zbA=cA-zvA,zbB=cB-zvB;function SC(l,ic,oA,oB,nA,nB){return`<div class="sc"><div class="ic">${ic}</div><div style="flex:1;min-width:0"><div class="ti">${l}</div><div class="cols"><div class="col ${oA?"ok":"no"}"><b style="color:${oA?"var(--g)":"var(--r)"}">${S.yA}:${oA?"OK":"Těžké"}</b>${nA}</div><div class="col ${oB?"ok":"no"}"><b style="color:${oB?"var(--g)":"var(--r)"}">${S.yB}:${oB?"OK":"Těžké"}</b>${nB}</div></div></div></div>`}const hA=Math.round(AN(dA.bm*55*.8,dA.hs,360)),hB=Math.round(AN(dB.bm*55*.8,dB.hs,360)),rdA=Math.round(15e3*xA),rdB=Math.round(15e3*xB),dvA=Math.round(45e3*xA),dvB=Math.round(45e3*xB);
return[SC("Vlastní bydlení","🏠",hA<cA*.4,hB<cB*.4,`Splátka ${F(hA)} (${(hA/cA*100).toFixed(0)}%)`,`Splátka ${F(hB)} (${(hB/cB*100).toFixed(0)}%)`),SC("Nové auto","🚗",Math.round(5e5*xA/60)<zbA*.3,Math.round(5e5*xB/60)<zbB*.3,`~${F(Math.round(5e5*xA/60))}/m`,`~${F(Math.round(5e5*xB/60))}/m`),SC("Rodina 2 děti","👨‍👩‍👧‍👦",(cA-zvA-rdA)>5e3,(cB-zvB-rdB)>5e3,`+${F(rdA)}, zb.${F(Math.max(0,cA-zvA-rdA))}`,`+${F(rdB)}, zb.${F(Math.max(0,cB-zvB-rdB))}`),SC("Dovolená","✈️",zbA*3>dvA,zbB*3>dvB,`${F(dvA)}, ${zbA>0?Math.ceil(dvA/zbA):99}m`,`${F(dvB)}, ${zbB>0?Math.ceil(dvB/zbB):99}m`),SC("Spoření","💰",Math.max(0,zbA-rdA)>3e3,Math.max(0,zbB-rdB)>3e3,`~${F(Math.max(0,zbA-rdA))}/m`,`~${F(Math.max(0,zbB-rdB))}/m`)].join("")+`<div style="padding:4px 8px;border-radius:6px;background:#f0ebe4;font-size:9px;color:var(--mut)"><b style="color:#3a3a3a">Volné:</b> čistý−život = <b style="color:var(--g)">${F(zbA)}</b> vs <b style="color:var(--r)">${F(zbB)}</b></div>`})()}
